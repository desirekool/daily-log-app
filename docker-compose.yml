services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: daily_log_postgres
    environment:
      POSTGRES_DB: daily_log_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - daily-log-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: daily_log_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - daily-log-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daily_log_backend
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/daily_log_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    networks:
      - daily-log-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_SENTRY_DSN: ${REACT_APP_SENTRY_DSN:-}
    container_name: daily_log_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080
    networks:
      - daily-log-network

volumes:
  postgres_data:
  redis_data:

networks:
  daily-log-network:
    driver: bridge